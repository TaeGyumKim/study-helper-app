name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-check:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: TypeScript check (main process)
        run: npx tsc --noEmit -p tsconfig.node.json

      - name: Build (electron-vite)
        run: npm run build

      - name: Unit tests
        run: npm run test
