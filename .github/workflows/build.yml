name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '릴리스 버전 (예: 1.2.0) — 비우면 package.json 버전 사용'
        required: false
        type: string

permissions:
  contents: write

jobs:
  # ── 버전 결정 ──────────────────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VER="${{ github.event.inputs.version }}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VER="${GITHUB_REF#refs/tags/v}"
          else
            VER=$(node -p "require('./package.json').version")
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "tag=v$VER" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $VER"

  # ── 빌드 (Win / macOS x64 / macOS arm64) ──────────────────────
  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            python-arch: x64
          - os: macos-latest
            platform: mac
            python-arch: x64
          - os: macos-14
            platform: mac
            python-arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout app
        uses: actions/checkout@v4

      - name: Checkout core
        uses: actions/checkout@v4
        with:
          repository: TaeGyumKim/study-helper
          path: study-helper-core
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Move core to sibling directory
        run: |
          mv study-helper-core ../study-helper
        shell: bash

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: ${{ matrix.python-arch }}

      - name: Install Python dependencies
        run: |
          cd ../study-helper
          pip install -e ".[dev]"
          pip install pyinstaller
        shell: bash

      - name: Install ffmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Install ffmpeg (Windows)
        if: runner.os == 'Windows'
        run: choco install ffmpeg -y
        shell: bash

      - name: Sync version to package.json
        run: npm version ${{ needs.prepare.outputs.version }} --no-git-tag-version --allow-same-version
        shell: bash

      - name: Build Python core
        run: python scripts/build-core.py
        shell: bash

      - name: Install Node dependencies
        run: npm ci

      - name: Build Electron app
        run: npm run build

      - name: Package (${{ matrix.platform }})
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Windows: 코드 서명 비활성화 (개인 프로젝트)
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # macOS 코드 서명 (선택 — secrets 없으면 자동 스킵)
          CSC_LINK: ${{ secrets.MAC_CERT_P12 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --${{ matrix.platform }} --config --publish never
        shell: bash

      - name: List build artifacts
        run: ls -lh dist/ || dir dist
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform }}-${{ matrix.python-arch }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.yml
            dist/*.blockmap
          retention-days: 30

  # ── GitHub Release 생성 ────────────────────────────────────────
  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Collect release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" \) -exec cp {} release/ \;
          ls -lh release/
        shell: bash

      - name: Generate release notes
        id: notes
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          VER="${{ needs.prepare.outputs.version }}"
          cat > release-notes.md << 'NOTES'
          ## Study Helper $VER

          ### 다운로드

          | 플랫폼 | 파일 |
          |--------|------|
          | Windows | `study-helper-app-$VER-setup.exe` |
          | macOS (Intel) | `Study Helper-$VER-x64.dmg` |
          | macOS (Apple Silicon) | `Study Helper-$VER-arm64.dmg` |

          ### 설치 방법

          **Windows**: exe 파일 실행 → 설치 경로 선택 → 완료
          **macOS**: dmg 열기 → Applications 폴더로 드래그

          ### 주요 변경사항

          최신 커밋 로그를 참조하세요.
          NOTES
          sed -i "s/\$VER/$VER/g" release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Study Helper ${{ needs.prepare.outputs.version }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
