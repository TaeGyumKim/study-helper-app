name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '릴리스 버전 (예: 1.2.0) — 비우면 package.json 버전 사용'
        required: false
        type: string

permissions:
  contents: write

jobs:
  # ── 버전 결정 ──────────────────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VER="${{ github.event.inputs.version }}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VER="${GITHUB_REF#refs/tags/v}"
          else
            VER=$(node -p "require('./package.json').version")
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "tag=v$VER" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $VER"

  # ── 빌드 (Win / macOS x64 / macOS arm64) ──────────────────────
  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            python-arch: x64
          - os: macos-latest
            platform: mac
            python-arch: x64
          - os: macos-14
            platform: mac
            python-arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout app
        uses: actions/checkout@v4

      # study-helper 코어를 워크스페이스 내부에 checkout
      # (Private repo인 경우 PAT 토큰을 CORE_TOKEN secret으로 등록)
      - name: Checkout core
        uses: actions/checkout@v4
        with:
          repository: TaeGyumKim/study-helper
          path: study-helper
          token: ${{ secrets.CORE_TOKEN != '' && secrets.CORE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: ${{ matrix.python-arch }}

      - name: Install Python dependencies
        shell: bash
        run: |
          cd study-helper
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Install ffmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Install ffmpeg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install ffmpeg -y

      - name: Sync version to package.json
        shell: bash
        run: npm version ${{ needs.prepare.outputs.version }} --no-git-tag-version --allow-same-version

      - name: Build Python core
        shell: bash
        env:
          # build-core.py가 형제 디렉토리 대신 워크스페이스 내 study-helper를 참조
          STUDY_HELPER_CORE_DIR: ${{ github.workspace }}/study-helper
        run: python scripts/build-core.py

      - name: Install Node dependencies
        run: npm ci

      - name: Build Electron app
        run: npm run build

      - name: Package (${{ matrix.platform }})
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_LINK: ${{ secrets.MAC_CERT_P12 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --${{ matrix.platform }} --config --publish never

      - name: List build artifacts
        shell: bash
        run: ls -lh dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform }}-${{ matrix.python-arch }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.yml
            dist/*.blockmap
          retention-days: 30

  # ── GitHub Release 생성 ────────────────────────────────────────
  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 20

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        shell: bash
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" \) -exec cp {} release/ \;
          echo "=== Release files ==="
          ls -lh release/

      - name: Generate release notes
        shell: bash
        run: |
          VER="${{ needs.prepare.outputs.version }}"
          cat > release-notes.md << EOF
          ## Study Helper ${VER}

          ### 다운로드

          | 플랫폼 | 파일 |
          |--------|------|
          | Windows | \`study-helper-app-${VER}-setup.exe\` |
          | macOS (Intel) | \`Study Helper-${VER}-x64.dmg\` |
          | macOS (Apple Silicon) | \`Study Helper-${VER}-arm64.dmg\` |

          ### 설치 방법

          **Windows**: exe 파일 실행 → 설치 경로 선택 → 완료
          **macOS**: dmg 열기 → Applications 폴더로 드래그

          ### 최근 변경사항

          $(git log --oneline -10 --no-decorate)
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Study Helper ${{ needs.prepare.outputs.version }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
