name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
            python-arch: x64
          - os: macos-latest
            platform: mac
            python-arch: x64
          - os: macos-14
            platform: mac
            python-arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout app
        uses: actions/checkout@v4

      - name: Checkout core
        uses: actions/checkout@v4
        with:
          repository: TaeGyumKim/study-helper
          path: ../study-helper

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: ${{ matrix.python-arch }}

      - name: Install Python dependencies
        run: |
          cd ../study-helper
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Build Python core
        run: python scripts/build-core.py

      - name: Install Node dependencies
        run: npm ci

      - name: Build Electron app
        run: npm run build

      - name: Package (${{ matrix.platform }})
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS 코드 서명 (선택)
          CSC_LINK: ${{ secrets.MAC_CERT_P12 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --${{ matrix.platform }} --config --publish always

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform }}-${{ matrix.python-arch }}
          path: dist/*
          retention-days: 30
